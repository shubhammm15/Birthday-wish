<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday 🎉</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      animation: bounce 2s infinite;
    }

    p {
      font-size: 1.2rem;
      margin-top: 20px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🎉 Happy Birthday Bachuuu! 🎂</h1>
    <p>
      Wishing you endless happiness, सफलता, and smiles 💖<br><br>
      You are truly special ✨<br>
      Enjoy your day to the fullest 🥳
    </p>
  </div>

</body>
</html>
